<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TS</title>
      <style>
          body { margin:0; height:100vh; }
          #app {
              display: flex;
              width: 100%;
              height: 100%;
          }
          #left, #right {
              flex: 1 1 0;
              position: relative; /* 子canvasをabsoluteで敷き詰めるなら相対に */
          }
          canvas { display:block; }
          #glRightCanvas, #glLeftCanvas, #sketchCanvas { position:absolute; inset:0; }
          #sketchCanvas{
              z-index: 1;
          }

      </style>
  </head>
  <body>
    <div id="app">
        <div id="left">
            <canvas id="glLeftCanvas"></canvas>
            <canvas id="sketchCanvas"></canvas>
        </div>
        <div id="right">
            <canvas id="glRightCanvas"></canvas>
        </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
